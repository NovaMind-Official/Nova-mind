<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Mind AI - Intelligence Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { 
            --p: #76b900; --bg: #000; --txt: #ffffff; 
            --brd: rgba(255,255,255,0.12); --apple-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
            --glow: rgba(118, 185, 0, 0.15);
        }
        
        /* Expanded Mood Colors */
        body.mood-pos { --p: #00f2ff; --glow: rgba(0, 242, 255, 0.3); }
        body.mood-neg { --p: #ff3b30; --glow: rgba(255, 59, 48, 0.3); }
        body.mood-neu { --p: #af52de; --glow: rgba(175, 82, 222, 0.3); }
        body.mood-excited { --p: #ff9500; --glow: rgba(255, 149, 0, 0.3); } /* Orange */
        body.mood-calm { --p: #5ac8fa; --glow: rgba(90, 200, 250, 0.3); } /* Teal/Light Blue */
        body.mood-angry { --p: #ff2d55; --glow: rgba(255, 45, 85, 0.3); } /* Pink/Red */

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--txt); height: 100dvh; display: flex; transition: 0.8s var(--apple-ease); overflow: hidden; }
        .bg-glow { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, var(--glow) 0%, transparent 85%); filter: blur(100px); transition: 0.8s; }

        #sidebar { position: fixed; left: -285px; width: 280px; height: 100%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(50px); border-right: 1px solid var(--brd); z-index: 4000; transition: transform 0.6s var(--apple-ease); }
        #sidebar.active { transform: translateX(285px); }
        .btn-new { width: 90%; margin: 20px auto; padding: 16px; background: #fff; border: none; color: #000; border-radius: 18px; font-weight: 700; cursor: pointer; display: block; letter-spacing: -0.5px; }

        #h-list { flex: 1; overflow-y: auto; padding: 15px; }
        .h-item { padding: 14px; border-radius: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; font-size: 13px; border: 1px solid transparent; transition: 0.3s; cursor: pointer; }
        .h-item.active-chat { border-color: var(--p); background: rgba(255,255,255,0.1); }

        main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        header { height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--brd); }
        .logo { font-size: 14px; letter-spacing: 5px; font-weight: 900; color: var(--p); text-transform: uppercase; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 8% 180px; display: flex; flex-direction: column; gap: 32px; scroll-behavior: smooth; }
        .welcome-wrap { text-align: center; margin: 60px 0; animation: fadeIn 1.2s ease; }
        .welcome-wrap h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; color: var(--p); letter-spacing: -1px; }
        .welcome-wrap p { color: rgba(255,255,255,0.5); font-size: 16px; }

        .msg-wrap { display: flex; flex-direction: column; max-width: 90%; animation: slideUp 0.6s var(--apple-ease); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .user-wrap { align-self: flex-end; }
        .ai-wrap { align-self: flex-start; width: 100%; }
        
        .msg { padding: 18px 24px; border-radius: 24px; font-size: 16px; line-height: 1.7; position: relative; }
        .user { background: var(--p); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
        .ai { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--brd); border-bottom-left-radius: 4px; }

        #scroll-btn {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--p); color: #000; border: none; border-radius: 50%;
            width: 44px; height: 44px; font-size: 20px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 2000; transition: 0.3s;
        }

        pre { background: #0b0b0b !important; border: 1px solid var(--brd); border-radius: 20px; padding: 20px; position: relative; margin: 20px 0; overflow-x: auto; }
        .msg-ops { display: flex; gap: 18px; margin-top: 12px; opacity: 0.4; transition: 0.3s; }
        .msg-ops:hover { opacity: 1; }
        .op-btn { cursor: pointer; font-size: 11px; font-weight: 700; color: var(--p); text-transform: uppercase; letter-spacing: 0.5px; }

        .drop-menu { 
            position: absolute; bottom: 100px; left: 25px; width: 280px;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(50px);
            border-radius: 28px; border: 1px solid var(--brd); display: none; flex-direction: column; z-index: 5000; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .drop-menu.show { display: flex; animation: menuPop 0.4s var(--apple-ease); }
        .menu-item { padding: 20px; font-size: 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; }

        footer { position: absolute; bottom: 0; width: 100%; padding: 20px 5% 45px; background: linear-gradient(transparent, var(--bg) 80%); }
        .input-bar { background: rgba(255,255,255,0.08); backdrop-filter: blur(30px); border: 1px solid var(--brd); border-radius: 35px; display: flex; align-items: center; padding: 8px 22px; gap: 15px; }
        #ui { flex: 1; background: transparent; border: none; color: #fff; padding: 12px 0; font-size: 17px; resize: none; height: 50px; max-height: 150px; overflow-y: auto; }

        .btn-icon { background: none; border: none; color: var(--p); font-size: 25px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .btn-icon:hover { transform: scale(1.1); }
        
        .file-badge { display: none; margin-left: 20px; margin-bottom: 10px; background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--p); border: 1px solid var(--p); width: fit-content; animation: fadeIn 0.3s; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 3000; backdrop-filter: blur(8px); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .input-bar { padding: 6px 15px; gap: 10px; }
            #ui { font-size: 15px; height: 45px; padding: 10px 0; max-height: 100px; }
            .btn-icon { font-size: 22px; }
            #chat-box { padding: 20px 5% 150px; }
        }
    </style>
</head>
<body onclick="closeAll()">

<div class="bg-glow"></div>
<div id="overlay" onclick="toggleS()"></div>

<div id="sidebar" onclick="event.stopPropagation()">
    <div style="padding: 30px 25px; display: flex; justify-content: space-between;">
        <span style="font-weight: 900; color: var(--p);">SESSIONS</span>
        <button class="btn-icon" style="font-size: 20px;" onclick="toggleS()">❮</button>
    </div>
    <button onclick="newChat()" class="btn-new">NEW CONVERSATION</button>
    <div id="h-list"></div>
</div>

<main>
    <header>
        <button class="btn-icon" onclick="toggleS(event)">☰</button>
        <div class="logo">Nova Mind AI</div>
        <div style="width:28px;"></div>
    </header>

    <div id="chat-box"></div>
    
    <button id="scroll-btn" onclick="scrollToBottom()">↓</button>

    <div id="gear-menu" class="drop-menu" onclick="event.stopPropagation()">
        <div class="menu-item" onclick="toggleDeep()">🧠 Deep Thinking <span id="deep-status" style="margin-left:auto; font-weight:bold; opacity:0.5;">OFF</span></div>
        <div class="menu-item" onclick="tool('image')">🎨 AI Image Engine</div>
        <div class="menu-item" onclick="tool('music')">🎵 AI Music Engine</div>
        <div class="menu-item" onclick="tool('video')">🎬 AI Video Engine</div>
    </div>

    <footer>
        <div id="edit-indicator" style="display:none; color:var(--p); font-size:11px; margin-bottom:8px; padding-left:25px; font-weight:700;">
            EDITING... <span onclick="cancelEdit()" style="color:#fff; cursor:pointer; margin-left:15px; text-decoration:underline;">CANCEL</span>
        </div>
        <div id="file-badge" class="file-badge">📎 <span id="file-name"></span></div>
        <div class="input-bar" onclick="event.stopPropagation()">
            <input type="file" id="file-upload" style="display:none;" onchange="handleFile(event)">
            <button class="btn-icon" onclick="document.getElementById('file-upload').click()" title="Attach File">📎</button>
            <button class="btn-icon" onclick="toggleGear(event)" title="Tools">⚙️</button>
            <textarea id="ui" placeholder="Message Nova Mind AI..." spellcheck="false"></textarea>
            <button id="send-btn" class="btn-icon" onclick="send()">🚀</button>
        </div>
    </footer>
</main>

<script>
    // Security Key Split
    const _PART_A = "gsk_AJNzgI5X09s1awxwonid";
    const _PART_B = "WGdyb3FYJEQ4bxmGUdiGQyFqyJyWdfLl";

    let chats = JSON.parse(localStorage.getItem("nv_v70_chats")) || [];
    let curId = localStorage.getItem("nv_v70_id");
    let deepThinking = false;
    let editIdx = -1;
    let attachedFileData = ""; 
    let attachedFileName = "";

    marked.setOptions({ highlight: (c) => hljs.highlightAuto(c).value, breaks: true });

    const chatBox = document.getElementById("chat-box");
    const scrollBtn = document.getElementById("scroll-btn");

    window.onload = () => {
        if (!chats.length) newChat(); else loadChat(curId);
        
        const ui = document.getElementById("ui");
        ui.addEventListener("input", function() {
            this.style.height = '50px';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            analyzeMood(this.value);
        });

        chatBox.addEventListener("scroll", () => {
            const diff = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight;
            scrollBtn.style.display = diff > 300 ? "flex" : "none";
        });
    };

    function handleFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        attachedFileName = file.name;
        document.getElementById("file-name").innerText = file.name;
        document.getElementById("file-badge").style.display = "block";
        
        if (file.type.startsWith("text/") || file.name.endsWith(".md") || file.name.endsWith(".js") || file.name.endsWith(".json") || file.name.endsWith(".html") || file.name.endsWith(".py")) {
            const reader = new FileReader();
            reader.onload = (evt) => { attachedFileData = evt.target.result; };
            reader.readAsText(file);
        } else {
            attachedFileData = `[User uploaded a media/binary file: ${file.name}. Please acknowledge it and analyze based on the user's description.]`;
        }
    }

    function scrollToBottom() { chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); }

    function analyzeMood(t) {
        const ex = /wow|awesome|amazing|omg|incredible|fire| عالی|محشر/i;
        const ca = /relax|calm|peace|chill|quiet|آرام/i;
        const an = /hate|angry|mad|damn|stupid|بد|احمق|عصبانی/i;
        const p = /good|great|happy|yes|perfect|love|خوب|بله/i;
        const n = /bad|sad|wrong|no|error|fail|نه|اشتباه/i;
        
        let m = "";
        if(ex.test(t)) m = "mood-excited";
        else if(an.test(t)) m = "mood-angry";
        else if(ca.test(t)) m = "mood-calm";
        else if(p.test(t)) m = "mood-pos";
        else if(n.test(t)) m = "mood-neg";
        else if(t.includes("?") || t.includes("چرا") || t.includes("چگونه")) m = "mood-neu";
        
        document.body.className = m;
    }

    function toggleS(e) { if(e) e.stopPropagation(); const a = document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").style.display = a ? "block" : "none"; }
    function closeAll() { document.getElementById("sidebar").classList.remove("active"); document.getElementById("gear-menu").classList.remove("show"); document.getElementById("overlay").style.display = "none"; }
    function toggleGear(e) { e.stopPropagation(); document.getElementById("gear-menu").classList.toggle("show"); }

    function toggleDeep() {
        deepThinking = !deepThinking;
        const s = document.getElementById("deep-status");
        s.innerText = deepThinking ? "ON" : "OFF";
        s.style.opacity = deepThinking ? "1" : "0.5";
    }

    function tool(type) {
        document.getElementById("ui").value = `Generate high-quality prompt for AI ${type}: `;
        document.getElementById("ui").focus();
        document.getElementById("gear-menu").classList.remove("show");
    }

    function newChat() {
        const id = Date.now();
        chats.unshift({ id, name: "New Discovery", msgs: [] });
        curId = id; save(); loadChat(id);
        closeAll();
    }

    async function send() {
        const inp = document.getElementById("ui"), txt = inp.value.trim();
        const fullKey = _PART_A + _PART_B;
        if(!txt && !attachedFileName) return;

        let finalPrompt = txt;
        if(attachedFileName) {
            finalPrompt += `\n\n[Attached File Content: ${attachedFileData}]`;
            document.getElementById("file-badge").style.display = "none";
            document.getElementById("file-upload").value = "";
            attachedFileData = "";
        }

        const chat = chats.find(c => c.id == curId);
        if(editIdx > -1) { chat.msgs = chat.msgs.slice(0, editIdx); editIdx = -1; document.getElementById("edit-indicator").style.display="none"; loadChat(curId); }

        inp.value = ""; inp.style.height = "50px";
        addUI(txt || `[Sent File: ${attachedFileName}]`, "user", "u-"+Date.now(), chat.msgs.length);
        attachedFileName = "";
        
        const aiId = "ai-"+Date.now();
        addUI("Neural Core processing...", "ai", aiId);

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${fullKey}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {role: "system", content: "You are Nova Mind AI, an advanced artificial intelligence. Respond professionally and clearly. You have powerful analytical skills. If the user provides file content, code, or mentions an image/video, analyze it deeply and give comprehensive insights."},
                        ...chat.msgs.flatMap(m=>[{role:"user",content:m.u},{role:"assistant",content:m.a}]),
                        {role: "user", content: (deepThinking ? "Deep Analysis: " : "") + finalPrompt}
                    ]
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            
            const full = data.choices[0].message.content;
            document.getElementById(aiId).innerHTML = marked.parse(full);
            if(chat.msgs.length === 0) chat.name = (txt || "File Upload").substring(0, 20);
            chat.msgs.push({u: finalPrompt, a: full}); 
            save(); renderH(); addCopyLogic();
            scrollToBottom();
        } catch(e) { 
            document.getElementById(aiId).innerHTML = "Critical Error: " + e.message;
        }
    }

    function addUI(t, r, id, idx) {
        const w = document.createElement("div");
        w.className = `msg-wrap ${r}-wrap`;
        if(id === 'welcome') {
            w.innerHTML = `<div class="welcome-wrap"><h1>NOVA MIND AI</h1><p>Hello! How can I help you today?</p></div>`;
        } else {
            const ops = r === 'user' 
                ? `<div class="msg-ops"><span class="op-btn" onclick="triggerEdit(${idx})">Edit</span><span class="op-btn" onclick="copyRaw('${id}', this)">Copy</span></div>`
                : `<div class="msg-ops"><span class="op-btn" onclick="copyRaw('${id}', this)">Copy</span><span class="op-btn" onclick="speak('${id}', this)">Listen</span><span class="op-btn" onclick="stopSpeak()" style="color:#fff;">Stop</span></div>`;
            
            // Clean up file tags visually for the user message bubble
            let displayTxt = t.replace(/\[Attached File Content:.*?\]/gs, '[File Attached]');
            w.innerHTML = `<div class="msg ${r}" id="${id}">${r === 'ai' ? t : displayTxt}</div>${ops}`;
        }
        chatBox.appendChild(w);
        scrollToBottom();
    }

    function triggerEdit(idx) {
        const chat = chats.find(c => c.id == curId);
        document.getElementById("ui").value = chat.msgs[idx].u.replace(/\[Attached File Content:.*?\]/gs, '');
        document.getElementById("ui").focus();
        editIdx = idx;
        document.getElementById("edit-indicator").style.display = "block";
    }

    function cancelEdit() { editIdx = -1; document.getElementById("ui").value = ""; document.getElementById("edit-indicator").style.display = "none"; }

    function copyRaw(id, btn) {
        navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
            const old = btn.innerText; btn.innerText = "COPIED";
            setTimeout(() => btn.innerText = old, 1500);
        });
    }

    function speak(id, btn) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(document.getElementById(id).innerText);
        window.speechSynthesis.speak(u);
        btn.innerText = "SPEAKING...";
        u.onend = () => btn.innerText = "LISTEN";
    }
    function stopSpeak() { window.speechSynthesis.cancel(); }

    function addCopyLogic() {
        document.querySelectorAll('pre').forEach(pre => {
            if(pre.querySelector('.copy-btn')) return;
            const b = document.createElement('button'); b.innerText = 'COPY CODE';
            b.style = "position:absolute; top:15px; right:15px; background:var(--p); border:none; padding:6px 12px; border-radius:10px; font-size:10px; font-weight:800; cursor:pointer; color:#000;";
            b.onclick = () => { navigator.clipboard.writeText(pre.innerText); b.innerText = 'DONE'; setTimeout(()=>b.innerText='COPY CODE', 2000); };
            pre.appendChild(b);
        });
    }

    function loadChat(id) {
        curId = id; save();
        const chat = chats.find(c => c.id == id);
        chatBox.innerHTML = "";
        addUI("", "ai", "welcome");
        if(chat && chat.msgs.length) chat.msgs.forEach((m, i) => { addUI(m.u, "user", "u-"+i, i); addUI(marked.parse(m.a), "ai", "a-"+i); });
        renderH(); addCopyLogic();
    }

    function save() { localStorage.setItem("nv_v70_chats", JSON.stringify(chats)); localStorage.setItem("nv_v70_id", curId); }
    
    function renderH() {
        document.getElementById("h-list").innerHTML = chats.map(c => `
            <div class="h-item ${c.id == curId ? 'active-chat' : ''}" onclick="loadChat(${c.id})">
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:140px;"># ${c.name}</span>
                <div style="display:flex; gap:10px;">
                    <button onclick="renameH(event, ${c.id})" style="background:none; border:none; color:var(--p); font-size:12px; cursor:pointer;">✏️</button>
                    <button onclick="delH(event, ${c.id})" style="background:none; border:none; color:#fff; opacity:0.2; font-size:12px; cursor:pointer;">🗑️</button>
                </div>
            </div>`).join("");
    }

    function renameH(e, id) { e.stopPropagation(); const n = prompt("Rename to:"); if(n) { chats.find(c=>c.id==id).name = n; save(); renderH(); } }
    function delH(e, id) { e.stopPropagation(); if(confirm("Delete session?")) { chats = chats.filter(c=>c.id!=id); if(!chats.length) newChat(); else loadChat(chats[0].id); save(); renderH(); } }
</script>
</body>
</html>
